<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>비모임 신청 현황 · b.moim</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #202124;
      --muted: #5f6368;
      --border: #dfe1e5;
      --blue: #1a73e8;
      --blue-hover: #1765cc;
      --bg: #fff;
      --surface: #f8f9fa;
      --cancel: #d93025;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }
    .gate {
      min-height: calc(100dvh - 128px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .logo {
      font-family: 'Noto Serif KR', serif;
      font-size: 44px;
      font-weight: 600;
      letter-spacing: -.02em;
      margin-bottom: 28px;
    }
    .logo span { color: var(--blue); }
    .gate-lead {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .code-form {
      width: min(100%, 584px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .code-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 6px 8px 6px 20px;
      box-shadow: 0 1px 6px rgba(32, 33, 36, .08);
      transition: box-shadow .2s, border-color .2s;
    }
    .code-box:focus-within {
      border-color: transparent;
      box-shadow: 0 1px 6px rgba(32, 33, 36, .16), 0 0 0 1px #dadce0;
    }
    .code-box input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 16px;
      padding: 10px 0;
      background: transparent;
      min-width: 0;
    }
    .code-box button {
      border: none;
      border-radius: 18px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      padding: 10px 18px;
      cursor: pointer;
    }
    .code-box button.primary {
      background: var(--blue);
      color: #fff;
    }
    .code-box button.primary:hover { background: var(--blue-hover); }
    .code-box button:disabled { opacity: .55; cursor: default; }
    .gate-msg {
      min-height: 20px;
      font-size: 13px;
      color: var(--cancel);
      margin-top: 4px;
    }
    .gate-msg.ok { color: var(--muted); }
    .dash { display: none; }
    .dash.on { display: block; }
    .dash-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .dash-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .dash-sub { font-size: 13px; color: var(--muted); }
    .btn-text {
      border: none;
      background: none;
      color: var(--blue);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 0;
    }
    .summary {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .summary-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 120px;
    }
    .summary-item strong {
      display: block;
      font-size: 22px;
      margin-bottom: 2px;
    }
    .summary-item span {
      font-size: 12px;
      color: var(--muted);
    }
    .moim-block {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .moim-block-head {
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .moim-block-head h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 2px;
    }
    .moim-block-head p {
      font-size: 12px;
      color: var(--muted);
    }
    .session-label {
      padding: 10px 16px 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-top: 1px solid #f1f3f4;
      vertical-align: top;
    }
    th {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      background: #fff;
    }
    tr.cancelled td {
      color: #9aa0a6;
      text-decoration: line-through;
    }
    tr.cancelled td:last-child {
      text-decoration: none;
      color: var(--cancel);
      font-weight: 600;
    }
    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .foot {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      .logo { font-size: 36px; }
      .page { padding-top: 32px; }
      .dash-head { flex-direction: column; }
      table { font-size: 12px; }
      th:nth-child(1), td:nth-child(1) { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="gate" id="gate">
      <div class="logo">b<span>.</span>moim</div>
      <p class="gate-lead">점주 전용 코드를 입력하면<br>개설 모임의 신청 현황을 확인할 수 있습니다.</p>
      <form class="code-form" id="codeForm">
        <div class="code-box">
          <input type="password" id="codeInput" autocomplete="off" placeholder="점주 코드" maxlength="32" required>
          <button type="submit" class="primary" id="codeBtn">확인</button>
        </div>
        <div class="gate-msg" id="gateMsg"></div>
      </form>
    </section>

    <section class="dash" id="dash">
      <div class="dash-head">
        <div>
          <div class="dash-title" id="dashTitle">신청 현황</div>
          <div class="dash-sub" id="dashSub"></div>
        </div>
        <button type="button" class="btn-text" id="logoutBtn">다른 코드 입력</button>
      </div>
      <div class="summary" id="summary"></div>
      <div id="moimList"></div>
    </section>

    <p class="foot">비북스 b.moim · 점주 전용 페이지</p>
  </div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwfZYQ9FtaMWm6ZqyPhd1tByTzrQV352jtQZYT0-lplGlR0WOKCW_V928gLmRptuPik4g/exec';
const MONTH = '6월';
const STORAGE_KEY = 'bmoim_host_code_v1';

const gate = document.getElementById('gate');
const dash = document.getElementById('dash');
const codeForm = document.getElementById('codeForm');
const codeInput = document.getElementById('codeInput');
const codeBtn = document.getElementById('codeBtn');
const gateMsg = document.getElementById('gateMsg');
const dashTitle = document.getElementById('dashTitle');
const dashSub = document.getElementById('dashSub');
const summary = document.getElementById('summary');
const moimList = document.getElementById('moimList');

function setGateMsg(text, ok) {
  gateMsg.textContent = text || '';
  gateMsg.classList.toggle('ok', !!ok);
}

function formatPhone(phone) {
  const digits = String(phone || '').replace(/\D/g, '');
  if (digits.length === 11) return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7)}`;
  if (digits.length === 10) return `${digits.slice(0, 3)}-${digits.slice(3, 6)}-${digits.slice(6)}`;
  return phone || '';
}

function formatAmount(amount) {
  return Number(amount || 0).toLocaleString('ko-KR') + '원';
}

function showGate() {
  sessionStorage.removeItem(STORAGE_KEY);
  dash.classList.remove('on');
  gate.style.display = 'flex';
  codeInput.value = '';
  codeInput.focus();
  setGateMsg('');
}

function showDash(data) {
  gate.style.display = 'none';
  dash.classList.add('on');
  dashTitle.textContent = data.hostName ? `${data.hostName} 님의 신청 현황` : '신청 현황';
  dashSub.textContent = `${data.month || MONTH} · ${data.moims.length}개 모임`;

  summary.innerHTML = `
    <div class="summary-item"><strong>${data.totalActive}</strong><span>유효 신청</span></div>
    <div class="summary-item"><strong>${data.totalCancelled}</strong><span>취소</span></div>
    <div class="summary-item"><strong>${data.totalAll}</strong><span>전체 접수</span></div>
  `;

  if (!data.moims.length) {
    moimList.innerHTML = '<div class="empty">표시할 신청 내역이 없습니다.</div>';
    return;
  }

  moimList.innerHTML = data.moims.map(moim => {
    const sessions = moim.sessions.map(session => {
      if (!session.applications.length) {
        return `<div class="session-label">${session.label}</div><div class="empty">신청자 없음</div>`;
      }
      const rows = session.applications.map(app => `
        <tr class="${app.cancelled ? 'cancelled' : ''}">
          <td>${app.appliedAt || ''}</td>
          <td>${app.name || ''}</td>
          <td>${formatPhone(app.phone)}</td>
          <td>${formatAmount(app.amount)}</td>
          <td>${app.note || ''}</td>
        </tr>
      `).join('');
      return `
        <div class="session-label">${session.label} · ${session.activeCount}명</div>
        <table>
          <thead>
            <tr><th>신청일시</th><th>이름</th><th>연락처</th><th>참가비</th><th>비고</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }).join('');

    return `
      <article class="moim-block">
        <div class="moim-block-head">
          <h3>${moim.name}</h3>
          <p>유효 신청 ${moim.activeCount}명</p>
        </div>
        ${sessions}
      </article>
    `;
  }).join('');
}

async function loadStatus(code) {
  setGateMsg('');
  codeBtn.disabled = true;
  codeBtn.textContent = '확인 중...';

  try {
    const url = `${API}?action=hostStatus&code=${encodeURIComponent(code)}&month=${encodeURIComponent(MONTH)}`;
    const res = await fetch(url, { redirect: 'follow' });
    const data = await res.json();

    if (data.error) {
      setGateMsg(data.error);
      return;
    }

    sessionStorage.setItem(STORAGE_KEY, code);
    showDash(data);
  } catch (e) {
    setGateMsg('현황을 불러오지 못했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    codeBtn.disabled = false;
    codeBtn.textContent = '확인';
  }
}

codeForm.addEventListener('submit', e => {
  e.preventDefault();
  const code = codeInput.value.trim();
  if (!code) {
    setGateMsg('코드를 입력해주세요.');
    return;
  }
  loadStatus(code);
});

document.getElementById('logoutBtn').addEventListener('click', showGate);

const saved = sessionStorage.getItem(STORAGE_KEY);
if (saved) loadStatus(saved);
</script>
</body>
</html>
